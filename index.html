<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>線上點餐</title>

  <style>
    :root {
      --primary: #35858E;
      --secondary: #7DA78C;
      --accent: #C2D099;
      --background: #E6EEC9;
      --surface: rgba(255, 255, 255, 0.9);
      --card: rgba(255, 255, 255, 0.82);
      --text: rgba(20, 25, 25, 0.88);
      --muted: rgba(20, 25, 25, 0.55);
      --border: rgba(125, 167, 140, 0.32);
      --danger: #e74c3c;
      --shadow: 0 12px 28px rgba(0,0,0,0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(53,133,142,0.22), rgba(230,238,201,0.9)),
        var(--background);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 30;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      color: white;
      padding: 18px 22px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .brand-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .brand-subtitle {
      margin-top: 4px;
      font-size: 13px;
      opacity: 0.88;
    }

    .cart-pill {
      border: 0;
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .layout {
      max-width: 1280px;
      margin: 22px auto;
      padding: 0 18px;
      display: grid;
      grid-template-columns: 230px minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .side-panel {
      padding: 16px;
      position: sticky;
      top: 92px;
    }

    .search {
      width: 100%;
      border: 1px solid var(--border);
      background: white;
      border-radius: 16px;
      padding: 14px 14px;
      font-size: 16px;
      outline: none;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 800;
      margin: 10px 0;
    }

    .category-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .category-btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.75);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 14px;
      text-align: left;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
    }

    .category-btn.active {
      background: var(--primary);
      color: white;
    }

    .menu-panel {
      padding: 18px;
    }

    .menu-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      margin-bottom: 14px;
    }

    .menu-title {
      font-size: 24px;
      font-weight: 900;
    }

    .menu-count {
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
      gap: 12px;
    }
    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      min-height: 210px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 6px 16px rgba(0,0,0,0.04);
    }

    .product-image {
      width: 100%;
      height: 96px;
      background: rgba(194,208,153,0.34);
      object-fit: cover;
      display: block;
    }

    .product-image.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-weight: 800;
      font-size: 14px;
    }

    .product-body {
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .product-name {
      font-size: 15px;
      font-weight: 900;
      line-height: 1.25;
    }

    .product-desc {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      min-height: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-footer {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .price {
      color: var(--primary);
      font-size: 17px;
      font-weight: 900;
    }

    .add-btn {
      border: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      font-size: 22px;
      line-height: 32px;
      cursor: pointer;
      font-weight: 800;
      flex-shrink: 0;
    }

    .cart-panel {
      position: sticky;
      top: 92px;
      max-height: calc(100vh - 114px);
      display: flex;
      flex-direction: column;
    }

    .cart-header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .cart-header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
     .continue-btn {
      display: none;
      border: 0;
      background: rgba(53, 133, 142, 0.1);
      color: var(--primary);
      font-weight: 900;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 999px;
    }
    .cart-title {
      font-size: 20px;
      font-weight: 900;
    }

    .clear-btn {
      border: 0;
      background: transparent;
      color: var(--primary);
      font-weight: 800;
      cursor: pointer;
    }

    .cart-items {
      padding: 14px;
      overflow: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 180px;
    }

    .cart-empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-weight: 700;
    }

    .cart-item {
      background: rgba(255,255,255,0.82);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
    }

    .cart-item-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .cart-item-name {
      font-weight: 900;
      line-height: 1.3;
    }

    .cart-item-price {
      color: var(--primary);
      font-weight: 900;
      white-space: nowrap;
    }

    .cart-item-sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .qty-row {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qty-btn {
      border: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--secondary);
      color: white;
      font-weight: 900;
      cursor: pointer;
    }

    .qty {
      font-weight: 900;
      min-width: 24px;
      text-align: center;
    }

    .remove-btn {
      margin-left: auto;
      border: 0;
      background: transparent;
      color: var(--danger);
      font-weight: 900;
      cursor: pointer;
    }

    .checkout-box {
      border-top: 1px solid var(--border);
      padding: 16px;
      background: rgba(230,238,201,0.72);
    }

    .amount-row {
      display: flex;
      justify-content: space-between;
      margin: 7px 0;
      color: var(--muted);
      font-weight: 700;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-weight: 900;
      font-size: 18px;
    }

    .total-price {
      color: var(--primary);
      font-size: 26px;
      font-weight: 900;
    }

    .checkout-btn {
      width: 100%;
      border: 0;
      margin-top: 16px;
      padding: 15px 16px;
      border-radius: 16px;
      background: var(--primary);
      color: white;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
    }

    .checkout-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .mobile-cart-btn {
      display: none;
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 50;
      border: 0;
      background: var(--primary);
      color: white;
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 900;
      box-shadow: var(--shadow);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.34);
      display: none;
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: min(560px, 100%);
      background: var(--background);
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.22);
      padding: 22px;
    }

    .modal-title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .modal-subtitle {
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 18px;
    }

    .form-grid {
      display: grid;
      gap: 12px;
      margin: 16px 0;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
    }

    .field input,
    .field textarea {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 16px;
      outline: none;
      background: rgba(255,255,255,0.9);
      font-family: inherit;
    }

    .payment-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 8px;
    }

    .payment-btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.8);
      border-radius: 14px;
      padding: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .payment-btn.active {
      background: var(--primary);
      color: white;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .secondary-btn,
    .primary-btn {
      border: 0;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .secondary-btn {
      background: rgba(255,255,255,0.8);
      color: var(--text);
    }

    .primary-btn {
      background: var(--primary);
      color: white;
    }

    .loading,
    .error {
      padding: 36px;
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      background: rgba(20,25,25,0.88);
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 800;
      display: none;
      z-index: 200;
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 980px) {
      header {
        padding: 14px 16px;
      }
    
      .brand-title {
        font-size: 20px;
      }
    
      .brand-subtitle {
        font-size: 12px;
      }
    
      .cart-pill {
        padding: 10px 12px;
        font-size: 13px;
      }
    
      .layout {
        grid-template-columns: 1fr;
        margin: 14px auto;
        padding: 0 12px;
        gap: 12px;
      }
    
      .side-panel {
        position: sticky;
        top: 72px;
        z-index: 20;
        padding: 10px;
        border-radius: 18px;
      }
    
      .section-title {
        display: none;
      }
    
      .category-list {
        flex-direction: row;
        overflow-x: auto;
        padding-bottom: 2px;
        gap: 8px;
      }
    
      .category-btn {
        white-space: nowrap;
        padding: 9px 13px;
        font-size: 14px;
        border-radius: 999px;
        flex: 0 0 auto;
      }
    
      .menu-panel {
        padding: 12px;
        border-radius: 18px;
      }
    
      .menu-head {
        margin-bottom: 10px;
      }
    
      .menu-title {
        font-size: 20px;
      }
    
      .menu-count {
        font-size: 12px;
      }
    
      .product-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
    
      .product-card {
        min-height: 185px;
        border-radius: 16px;
      }
    
      .product-image {
        height: 78px;
      }
    
      .product-body {
        padding: 9px 10px 10px;
        gap: 5px;
      }
    
      .product-name {
        font-size: 14px;
        line-height: 1.25;
        min-height: 34px;
      }
    
      .product-desc {
        font-size: 11px;
        line-height: 1.3;
        -webkit-line-clamp: 1;
        min-height: 14px;
      }
    
      .product-footer {
        gap: 6px;
      }
    
      .price {
        font-size: 15px;
      }
    
      .add-btn {
        width: 30px;
        height: 30px;
        font-size: 20px;
        line-height: 30px;
      }
    
      .cart-panel {
        display: none;
      }
    
      .cart-panel.mobile-open {
        display: flex;
        position: fixed;
        top: 76px;
        right: 10px;
        bottom: 10px;
        left: 10px;
        z-index: 80;
        max-height: none;
        border-radius: 20px;
      }
    
      .mobile-cart-btn {
        display: block;
      }
    
      .payment-grid {
        grid-template-columns: 1fr;
      }
      .cart-header-actions {
        gap: 8px;
      }
      
      .continue-btn,
      .clear-btn {
        font-size: 14px;
      }
      .continue-btn {
        display: inline-flex;
      }
    }
    @media (max-width: 430px) {
      .product-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
    
      .product-card {
        min-height: 170px;
      }
    
      .product-image {
        height: 68px;
      }
    
      .product-body {
        padding: 8px;
      }
    
      .product-name {
        font-size: 13px;
        min-height: 32px;
      }
    
      .product-desc {
        display: none;
      }
    
      .price {
        font-size: 14px;
      }
    
      .add-btn {
        width: 28px;
        height: 28px;
        font-size: 19px;
        line-height: 28px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div>
        <div class="brand-title">線上點餐</div>
        <div class="brand-subtitle">簡單點餐，送出後請等待店家確認</div>
      </div>

      <button class="cart-pill" onclick="toggleMobileCart()">
        購物車 <span id="headerCartCount">0</span>｜NT$<span id="headerCartTotal">0</span>
      </button>
    </div>
  </header>

  <main class="layout">
    <aside class="panel side-panel">
      <div class="section-title">分類</div>
      <div id="categoryList" class="category-list"></div>
    </aside>

    <section class="panel menu-panel">
      <div class="menu-head">
        <div class="menu-title" id="currentCategoryTitle">全部</div>
        <div class="menu-count" id="menuCount">0 項</div>
      </div>

      <div id="productGrid" class="product-grid">
        <div class="loading">菜單載入中...</div>
      </div>
    </section>

    <aside id="cartPanel" class="panel cart-panel">
      <div class="cart-header">
        <div class="cart-title">購物車</div>
      
        <div class="cart-header-actions">
          <button class="continue-btn" onclick="closeMobileCart()">繼續選購</button>
          <button class="clear-btn" onclick="clearCart()">清空</button>
        </div>
      </div>

      <div id="cartItems" class="cart-items"></div>

      <div class="checkout-box">
        <div class="amount-row">
          <span>小計</span>
          <span>NT$<span id="subtotal">0</span></span>
        </div>

        <div class="total-row">
          <span>總金額</span>
          <span class="total-price">NT$<span id="total">0</span></span>
        </div>

        <button id="checkoutBtn" class="checkout-btn" onclick="openCheckout()" disabled>
          前往結帳
        </button>
      </div>
    </aside>
  </main>

  <button class="mobile-cart-btn" onclick="toggleMobileCart()">
    購物車 <span id="mobileCartCount">0</span>｜NT$<span id="mobileCartTotal">0</span>
  </button>

  <div id="checkoutModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-title">確認訂單</div>
      <div class="modal-subtitle">請填寫資料並選擇付款方式</div>

      <div class="amount-row">
        <span>總金額</span>
        <strong>NT$<span id="modalTotal">0</span></strong>
      </div>

      <div class="section-title">付款方式</div>
      <div class="payment-grid">
        <button class="payment-btn active" data-payment="現金" onclick="selectPayment('現金')">現金</button>
        <button class="payment-btn" data-payment="Line Pay" onclick="selectPayment('Line Pay')">Line Pay</button>
        <button class="payment-btn" data-payment="台灣 Pay" onclick="selectPayment('台灣 Pay')">台灣 Pay</button>
      </div>

      <div class="form-grid">
        <div class="field">
          <label>姓名</label>
          <input id="customerName" placeholder="請輸入姓名" />
        </div>

        <div class="field">
          <label>電話</label>
          <input id="customerPhone" placeholder="請輸入電話" inputmode="tel" />
        </div>

        <div class="field">
          <label>備註</label>
          <textarea id="customerNote" rows="3" placeholder="例如：不要洋蔥、稍後取餐"></textarea>
        </div>
      </div>

      <div class="modal-actions">
        <button class="secondary-btn" onclick="closeCheckout()">取消</button>
        <button id="submitOrderBtn" class="primary-btn" onclick="submitOrder()">送出訂單</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzWUBLP5lncIdFNZ03Wfsbr8UMI5fBVe3ihjxnOasinn2f_8dT3PaWM0kmW9SY5zlNcSg/exec';

    let menuItems = [];
    let selectedCategory = '全部';
    let cart = [];
    let paymentMethod = '現金';

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = 'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 10000);

        window[callbackName] = function(data) {
          delete window[callbackName];
          script.remove();
          resolve(data);
        };

        const script = document.createElement('script');
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName;
        script.onerror = function() {
          delete window[callbackName];
          script.remove();
          reject(new Error('連線失敗'));
        };

        document.body.appendChild(script);
      });
    }

    async function loadMenu() {
      const grid = document.getElementById('productGrid');

      try {
        grid.innerHTML = '<div class="loading">菜單載入中...</div>';

        const data = await jsonp(API_URL + '?mode=webMenu');

        if (data.status !== 'success') {
          grid.innerHTML = '<div class="error">' + (data.message || '菜單讀取失敗') + '</div>';
          return;
        }

        menuItems = data.items || [];

        renderCategories();
        renderProducts();

      } catch (error) {
        grid.innerHTML = '<div class="error">菜單讀取失敗：' + error.message + '</div>';
      }
    }

    function renderCategories() {
      const list = document.getElementById('categoryList');

      const categories = ['全部', ...Array.from(new Set(
        menuItems.map(item => item.category).filter(Boolean)
      ))];

      list.innerHTML = categories.map(category => `
        <button
          class="category-btn ${category === selectedCategory ? 'active' : ''}"
          onclick="selectCategory('${escapeJs(category)}')"
        >
          ${escapeHtml(category)}
        </button>
      `).join('');
    }

    function selectCategory(category) {
      selectedCategory = category;
      renderCategories();
      renderProducts();
    }

    function renderProducts() {
      const grid = document.getElementById('productGrid');
      const filtered = menuItems.filter(item => {
        return selectedCategory === '全部' || item.category === selectedCategory;
      });

      document.getElementById('currentCategoryTitle').textContent = selectedCategory;
      document.getElementById('menuCount').textContent = filtered.length + ' 項';

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="loading">沒有符合的商品</div>';
        return;
      }

      grid.innerHTML = filtered.map(item => {
        const imageHtml = item.image
          ? `<img class="product-image" src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name)}" loading="lazy" onerror="this.replaceWith(createPlaceholder('${escapeJs(item.name)}'))">`
          : `<div class="product-image placeholder">暫無圖片</div>`;

        return `
          <article class="product-card">
            ${imageHtml}
            <div class="product-body">
              <div class="product-name">${escapeHtml(item.name)}</div>
              <div class="product-desc">${escapeHtml(item.description || '')}</div>

              <div class="product-footer">
                <div class="price">NT$${Number(item.price || 0)}</div>
                <button class="add-btn" onclick="addToCart('${escapeJs(item.name)}')">+</button>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    function createPlaceholder(name) {
      const div = document.createElement('div');
      div.className = 'product-image placeholder';
      div.textContent = '暫無圖片';
      return div;
    }

    function addToCart(name) {
      const item = menuItems.find(x => x.name === name);
      if (!item) return;

      const existing = cart.find(x => x.name === name);

      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({
          category: item.category,
          name: item.name,
          price: Number(item.price || 0),
          quantity: 1
        });
      }

      renderCart();
      showToast('已加入購物車');
    }

    function increaseQty(name) {
      const item = cart.find(x => x.name === name);
      if (!item) return;
      item.quantity += 1;
      renderCart();
    }

    function decreaseQty(name) {
      const item = cart.find(x => x.name === name);
      if (!item) return;

      if (item.quantity <= 1) {
        cart = cart.filter(x => x.name !== name);
      } else {
        item.quantity -= 1;
      }

      renderCart();
    }

    function removeCartItem(name) {
      cart = cart.filter(x => x.name !== name);
      renderCart();
    }

    function clearCart() {
      cart = [];
      renderCart();
    }

    function renderCart() {
      const cartItems = document.getElementById('cartItems');

      if (cart.length === 0) {
        cartItems.innerHTML = '<div class="cart-empty">尚未加入商品</div>';
      } else {
        cartItems.innerHTML = cart.map(item => {
          const lineTotal = item.price * item.quantity;

          return `
            <div class="cart-item">
              <div class="cart-item-top">
                <div>
                  <div class="cart-item-name">${escapeHtml(item.name)}</div>
                  <div class="cart-item-sub">NT$${item.price} x ${item.quantity}</div>
                </div>
                <div class="cart-item-price">NT$${lineTotal}</div>
              </div>

              <div class="qty-row">
                <button class="qty-btn" onclick="decreaseQty('${escapeJs(item.name)}')">−</button>
                <div class="qty">${item.quantity}</div>
                <button class="qty-btn" onclick="increaseQty('${escapeJs(item.name)}')">+</button>
                <button class="remove-btn" onclick="removeCartItem('${escapeJs(item.name)}')">刪除</button>
              </div>
            </div>
          `;
        }).join('');
      }

      const total = getTotal();
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);

      document.getElementById('subtotal').textContent = total;
      document.getElementById('total').textContent = total;
      document.getElementById('headerCartCount').textContent = count;
      document.getElementById('headerCartTotal').textContent = total;
      document.getElementById('mobileCartCount').textContent = count;
      document.getElementById('mobileCartTotal').textContent = total;
      document.getElementById('checkoutBtn').disabled = cart.length === 0;
    }

    function getTotal() {
      return cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
    }

    function openCheckout() {
      if (cart.length === 0) return;

      document.getElementById('modalTotal').textContent = getTotal();
      document.getElementById('checkoutModal').classList.add('show');
    }

    function closeCheckout() {
      document.getElementById('checkoutModal').classList.remove('show');
    }

    function selectPayment(method) {
      paymentMethod = method;

      document.querySelectorAll('.payment-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.payment === method);
      });
    }

    async function submitOrder() {
      const name = document.getElementById('customerName').value.trim();
      const phone = document.getElementById('customerPhone').value.trim();
      const note = document.getElementById('customerNote').value.trim();

      if (!name) {
        showToast('請輸入姓名');
        return;
      }

      if (!phone) {
        showToast('請輸入電話');
        return;
      }

      if (cart.length === 0) {
        showToast('購物車是空的');
        return;
      }

      const submitBtn = document.getElementById('submitOrderBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = '送出中...';

      const payload = {
        storeName: '線上點餐',
        storeCode: 'WEB',
        customerName: name,
        customerPhone: phone,
        customerNote: note,
        paymentMethod: paymentMethod,
        paymentMethodText: paymentMethod,
        subtotal: getTotal(),
        discountType: 'none',
        discountValue: 0,
        discountAmount: 0,
        total: getTotal(),
        items: cart.map(item => ({
          category: item.category,
          name: item.name,
          price: item.price,
          quantity: item.quantity,
          lineTotal: item.price * item.quantity
        }))
      };

      try {
        const data = await jsonp(
          API_URL +
          '?mode=webCheckout&payload=' +
          encodeURIComponent(JSON.stringify(payload))
        );

        if (data.status === 'success') {
          closeCheckout();
          clearCart();

          document.getElementById('customerName').value = '';
          document.getElementById('customerPhone').value = '';
          document.getElementById('customerNote').value = '';

          showToast('訂單已送出，訂單編號：' + (data.orderId || ''));
        } else {
          showToast(data.message || '訂單送出失敗');
        }

      } catch (error) {
        showToast('訂單送出失敗：' + error.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '送出訂單';
      }
    }

    function toggleMobileCart() {
      document.getElementById('cartPanel').classList.toggle('mobile-open');
    }
    function closeMobileCart() {
      document.getElementById('cartPanel').classList.remove('mobile-open');
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');

      setTimeout(() => {
        toast.classList.remove('show');
      }, 2200);
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeJs(value) {
      return String(value ?? '')
        .replaceAll('\\', '\\\\')
        .replaceAll("'", "\\'")
        .replaceAll('"', '\\"')
        .replaceAll('\n', '\\n')
        .replaceAll('\r', '');
    }

    loadMenu();
    renderCart();
  </script>
</body>
</html>
