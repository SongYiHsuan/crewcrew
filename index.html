<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>好膽賣早-線上點餐</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --primary: #35858E;
      --secondary: #7DA78C;
      --accent: #C2D099;
      --background: #E6EEC9;
      --surface: rgba(255, 255, 255, 0.9);
      --card: rgba(255, 255, 255, 0.82);
      --text: rgba(20, 25, 25, 0.88);
      --muted: rgba(20, 25, 25, 0.55);
      --border: rgba(125, 167, 140, 0.32);
      --danger: #e74c3c;
      --shadow: 0 12px 28px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(53,133,142,0.22), rgba(230,238,201,0.9)),
        var(--background);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 30;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      color: white;
      padding: 18px 22px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .brand-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .brand-subtitle {
      margin-top: 4px;
      font-size: 13px;
      opacity: 0.88;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .cart-pill,
    .group-pill {
      border: 0;
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .group-pill.primary {
      background: rgba(255,255,255,0.92);
      color: var(--primary);
    }

    .layout {
      max-width: 1280px;
      margin: 22px auto;
      padding: 0 18px;
      display: grid;
      grid-template-columns: 230px minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .side-panel {
      padding: 16px;
      position: sticky;
      top: 92px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 800;
      margin: 10px 0;
    }

    .category-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .category-btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.75);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 14px;
      text-align: left;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
    }

    .category-btn.active {
      background: var(--primary);
      color: white;
    }

    .group-info-card {
      margin-top: 16px;
      padding: 14px;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .group-info-card.hidden { display: none; }

    .group-info-title {
      font-weight: 900;
      margin-bottom: 6px;
    }

    .group-info-line {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.6;
    }

    .small-action-btn {
      width: 100%;
      margin-top: 10px;
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      background: var(--primary);
      color: white;
      font-weight: 900;
      cursor: pointer;
    }

    .menu-panel { padding: 18px; }

    .menu-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      margin-bottom: 14px;
      gap: 12px;
    }

    .menu-title {
      font-size: 24px;
      font-weight: 900;
    }

    .menu-count {
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
      gap: 12px;
    }

    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      min-height: 210px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 6px 16px rgba(0,0,0,0.04);
    }

    .product-image {
      width: 100%;
      height: 96px;
      background: rgba(194,208,153,0.34);
      object-fit: cover;
      display: block;
    }

    .product-image.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-weight: 800;
      font-size: 14px;
    }

    .product-body {
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .product-name {
      font-size: 15px;
      font-weight: 900;
      line-height: 1.25;
    }

    .product-desc {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      min-height: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-footer {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .price {
      color: var(--primary);
      font-size: 17px;
      font-weight: 900;
    }

    .add-btn {
      border: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      font-size: 22px;
      line-height: 32px;
      cursor: pointer;
      font-weight: 800;
      flex-shrink: 0;
    }

    .cart-panel {
      position: sticky;
      top: 92px;
      max-height: calc(100vh - 114px);
      display: flex;
      flex-direction: column;
    }

    .cart-header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .cart-title {
      font-size: 20px;
      font-weight: 900;
    }

    .clear-btn {
      border: 0;
      background: transparent;
      color: var(--primary);
      font-weight: 800;
      cursor: pointer;
    }

    .cart-items {
      padding: 14px;
      overflow: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 180px;
    }

    .cart-empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-weight: 700;
    }

    .cart-item {
      background: rgba(255,255,255,0.82);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
    }

    .cart-item-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .cart-item-name {
      font-weight: 900;
      line-height: 1.3;
    }

    .cart-item-price {
      color: var(--primary);
      font-weight: 900;
      white-space: nowrap;
    }

    .cart-item-sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .qty-row {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qty-btn {
      border: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--secondary);
      color: white;
      font-weight: 900;
      cursor: pointer;
    }

    .qty {
      font-weight: 900;
      min-width: 24px;
      text-align: center;
    }

    .remove-btn {
      margin-left: auto;
      border: 0;
      background: transparent;
      color: var(--danger);
      font-weight: 900;
      cursor: pointer;
    }

    .checkout-box {
      border-top: 1px solid var(--border);
      padding: 16px;
      background: rgba(230,238,201,0.72);
    }

    .amount-row {
      display: flex;
      justify-content: space-between;
      margin: 7px 0;
      color: var(--muted);
      font-weight: 700;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-weight: 900;
      font-size: 18px;
    }

    .total-price {
      color: var(--primary);
      font-size: 26px;
      font-weight: 900;
    }

    .cart-action-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .continue-shopping-btn {
      display: none;
      width: 100%;
      border: 1px solid var(--border);
      padding: 15px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.82);
      color: var(--text);
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
    }

    .checkout-btn {
      width: 100%;
      border: 0;
      margin-top: 0;
      padding: 15px 16px;
      border-radius: 16px;
      background: var(--primary);
      color: white;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
    }

    .checkout-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .mobile-cart-btn {
      display: none;
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 50;
      border: 0;
      background: var(--primary);
      color: white;
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 900;
      box-shadow: var(--shadow);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.34);
      display: none;
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .modal-backdrop.show { display: flex; }

    .modal {
      width: min(560px, 100%);
      max-height: calc(100vh - 36px);
      overflow: auto;
      background: var(--background);
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.22);
      padding: 22px;
    }

    .modal-title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .modal-subtitle {
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 18px;
    }

    .form-grid {
      display: grid;
      gap: 12px;
      margin: 16px 0;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
    }

    .field input,
    .field textarea {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 16px;
      outline: none;
      background: rgba(255,255,255,0.9);
      font-family: inherit;
      width: 100%;
    }

    .payment-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 8px;
    }

    .payment-btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.8);
      border-radius: 14px;
      padding: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .payment-btn.active {
      background: var(--primary);
      color: white;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .secondary-btn,
    .primary-btn {
      border: 0;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .secondary-btn {
      background: rgba(255,255,255,0.8);
      color: var(--text);
    }

    .primary-btn {
      background: var(--primary);
      color: white;
    }

    .primary-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .group-mode-banner {
      max-width: 1280px;
      margin: 14px auto -6px;
      padding: 0 18px;
      display: none;
    }

    .group-mode-banner.show { display: block; }

    .group-mode-inner {
      background: rgba(255,255,255,0.84);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .group-mode-title {
      font-weight: 900;
      color: var(--primary);
    }

    .group-mode-subtitle {
      margin-top: 3px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }


    .member-summary-title {
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .member-summary {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      max-height: 34vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    .member-summary.empty-hidden {
      display: none !important;
    }
    
    .cart-items.hidden-empty {
      display: none !important;
      min-height: 0;
      padding: 0;
    }
    
    .member-block.own {
      cursor: pointer;
      border-color: var(--primary);
      background: rgba(53,133,142,0.08);
    }
    
    .member-edit-hint {
      margin-top: 6px;
      font-size: 12px;
      color: var(--primary);
      font-weight: 900;
    }
    
    @media (max-width: 980px) {
      .member-summary {
        max-height: 32vh;
      }
    }

    .member-block {
      background: rgba(255,255,255,0.76);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      margin-bottom: 8px;
    }
    .member-block.own {
      cursor: pointer;
      border-color: var(--primary);
      background: rgba(53,133,142,0.08);
    }
    
    .member-edit-hint {
      margin-top: 6px;
      font-size: 12px;
      color: var(--primary);
      font-weight: 900;
    }

    .member-block-head {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 900;
    }

    .member-block-items {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      font-weight: 700;
    }

    .loading,
    .error {
      padding: 36px;
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      background: rgba(20,25,25,0.88);
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 800;
      display: none;
      z-index: 200;
      max-width: calc(100vw - 32px);
      text-align: center;
    }

    .toast.show { display: block; }

    @media (max-width: 980px) {
      header { padding: 14px 16px; }
      .brand-title { font-size: 20px; }
      .brand-subtitle { font-size: 12px; }
      .header-inner { align-items: flex-start; }
      .header-actions { gap: 8px; }
      .cart-pill, .group-pill { padding: 10px 12px; font-size: 13px; }

      .layout {
        grid-template-columns: 1fr;
        margin: 14px auto;
        padding: 0 12px;
        gap: 12px;
      }

      .side-panel {
        position: sticky;
        top: 72px;
        z-index: 20;
        padding: 10px;
        border-radius: 18px;
      }

      .section-title { display: none; }

      .category-list {
        flex-direction: row;
        overflow-x: auto;
        padding-bottom: 2px;
        gap: 8px;
      }

      .category-btn {
        white-space: nowrap;
        padding: 9px 13px;
        font-size: 14px;
        border-radius: 999px;
        flex: 0 0 auto;
      }

      .group-info-card { display: none !important; }

      .menu-panel { padding: 12px; border-radius: 18px; }
      .menu-head { margin-bottom: 10px; }
      .menu-title { font-size: 20px; }
      .menu-count { font-size: 12px; }

      .product-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .product-card { min-height: 185px; border-radius: 16px; }
      .product-image { height: 78px; }
      .product-body { padding: 9px 10px 10px; gap: 5px; }
      .product-name { font-size: 14px; line-height: 1.25; min-height: 34px; }
      .product-desc { font-size: 11px; line-height: 1.3; -webkit-line-clamp: 1; min-height: 14px; }
      .product-footer { gap: 6px; }
      .price { font-size: 15px; }
      .add-btn { width: 30px; height: 30px; font-size: 20px; line-height: 30px; }

      .cart-panel { display: none; }

      .cart-panel.mobile-open {
        display: flex;
        position: fixed;
        top: 76px;
        right: 10px;
        bottom: 10px;
        left: 10px;
        z-index: 80;
        max-height: none;
        border-radius: 20px;
      }

      .mobile-cart-btn { display: block; }

      .cart-action-row {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .continue-shopping-btn {
        display: block;
        font-size: 16px;
        padding: 14px 10px;
      }

      .checkout-btn {
        font-size: 16px;
        padding: 14px 10px;
      }

      .payment-grid { grid-template-columns: 1fr; }

      .group-mode-banner { margin: 10px auto -4px; padding: 0 12px; }
      .group-mode-inner { align-items: flex-start; flex-direction: column; }
      .modal-actions { grid-template-columns: 1fr; }
    }

    @media (max-width: 430px) {
      .product-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .product-card { min-height: 170px; }
      .product-image { height: 68px; }
      .product-body { padding: 8px; }
      .product-name { font-size: 13px; min-height: 32px; }
      .product-desc { display: none; }
      .price { font-size: 14px; }
      .add-btn { width: 28px; height: 28px; font-size: 19px; line-height: 28px; }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div>
        <div class="brand-title">好膽賣早</div>
        <div class="brand-subtitle" id="pageSubtitle">我們是 crewcrew 集團</div>
      </div>

      <div class="header-actions">
        <button class="group-pill primary" onclick="openCreateGroupModal()">我要開團</button>
        <button class="cart-pill" onclick="toggleMobileCart()">
          購物車 <span id="headerCartCount">0</span>｜NT$<span id="headerCartTotal">0</span>
        </button>
      </div>
    </div>
  </header>

  <div id="groupModeBanner" class="group-mode-banner">
    <div class="group-mode-inner">
      <div>
        <div class="group-mode-title" id="groupBannerTitle">團訂模式</div>
        <div class="group-mode-subtitle" id="groupBannerSubtitle">請選擇餐點後加入團訂</div>
      </div>
      <button class="small-action-btn" style="width:auto; margin-top:0;" onclick="copyGroupLink()">複製團訂連結</button>
    </div>
  </div>

  <main class="layout">
    <aside class="panel side-panel">
      <div class="section-title">分類</div>
      <div id="categoryList" class="category-list"></div>

      <div id="groupInfoCard" class="group-info-card hidden">
        <div class="group-info-title">團訂資訊</div>
        <div class="group-info-line" id="sideGroupTitle">-</div>
        <div class="group-info-line" id="sideGroupPickup">-</div>
        <div class="group-info-line" id="sideGroupStatus">-</div>
        <button class="small-action-btn" onclick="copyGroupLink()">複製分享連結</button>
        <button id="hostSubmitGroupBtn" class="small-action-btn" onclick="submitGroupOrder()" style="display:none; background: var(--secondary);">主揪送出團訂</button>
      </div>
    </aside>

    <section class="panel menu-panel">
      <div class="menu-head">
        <div class="menu-title" id="currentCategoryTitle">全部</div>
        <div class="menu-count" id="menuCount">0 項</div>
      </div>

      <div id="productGrid" class="product-grid">
        <div class="loading">菜單載入中...</div>
      </div>
    </section>

    <aside id="cartPanel" class="panel cart-panel">
      <div class="cart-header">
        <div class="cart-title" id="cartTitle">購物車</div>
        <button class="clear-btn" onclick="clearCart()">清空</button>
      </div>

      <div id="cartItems" class="cart-items"></div>

      <div class="checkout-box">
        <div class="amount-row">
          <span>小計</span>
          <span>NT$<span id="subtotal">0</span></span>
        </div>

        <div class="total-row">
          <span>總金額</span>
          <span class="total-price">NT$<span id="total">0</span></span>
        </div>

        <div id="groupMembersSummary" class="member-summary" style="display:none;"></div>

        <div class="cart-action-row">
            <button class="continue-shopping-btn" onclick="closeMobileCart()">繼續選購</button>
            <button id="checkoutBtn" class="checkout-btn" onclick="openCheckout()" disabled>前往結帳</button>
          </div>
          
          <button
            id="hostSubmitGroupCartBtn"
            class="checkout-btn host-submit-cart-btn"
            onclick="submitGroupOrder()"
            style="display:none; margin-top:10px; background: var(--secondary);"
          >

  <div id="toast" class="toast"></div>
  
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwDOLkROkEIgb-BQ85aU7QpysOG2Hb0Um5HPsb0uwDokJ2B64Erhsv9VfrsLL-XRAoPPQ/exec';


    const LIFF_ID = '2010023878-EWi7Mfxe';
    
    let lineProfile = {
      lineUserId: '',
      lineDisplayName: '',
      linePictureUrl: ''
    };
    
    let menuItems = [];
    let selectedCategory = '全部';
    let cart = [];
    let paymentMethod = '現金';
    
    let groupId = '';
    let isHostMode = false;
    let currentGroup = null;
    let groupMembers = [];
    let groupRefreshTimer = null;
    
    function getMemberStorageKey() {
      return groupId ? 'group_member_' + groupId : 'group_member_normal';
    }
    
    function getGroupMemberId() {
      const key = groupId ? 'group_member_id_' + groupId : 'group_member_id_normal';
      let id = '';
    
      try {
        id = localStorage.getItem(key) || '';
    
        if (!id) {
          id = 'M' + Date.now() + Math.floor(Math.random() * 10000);
          localStorage.setItem(key, id);
        }
      } catch (error) {
        id = 'M' + Date.now() + Math.floor(Math.random() * 10000);
      }
    
      return id;
    }

    function prefillGroupMemberInfo() {
      const nameInput = document.getElementById('customerName');
      const phoneInput = document.getElementById('customerPhone');
    
      if (!nameInput || !phoneInput) return;
    
      // 主揪模式：優先帶入主揪資料
      if (isHostMode && currentGroup) {
        nameInput.value = currentGroup.hostName || '';
        phoneInput.value = currentGroup.hostPhone || '';
        return;
      }
    
      // 跟團者：用這支手機之前填過的資料
      try {
        const saved = JSON.parse(localStorage.getItem(getMemberStorageKey()) || '{}');
    
        if (saved.memberName) {
          nameInput.value = saved.memberName;
        }
    
        if (saved.memberPhone) {
          phoneInput.value = saved.memberPhone;
        }
      } catch (error) {
        // localStorage 失敗就略過，不影響點餐
      }
    }
    function getMemberStorageKey() {
      return groupId ? 'group_member_' + groupId : 'group_member_normal';
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = 'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 10000);

        window[callbackName] = function(data) {
          delete window[callbackName];
          script.remove();
          resolve(data);
        };

        const script = document.createElement('script');
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName;
        script.onerror = function() {
          delete window[callbackName];
          script.remove();
          reject(new Error('連線失敗'));
        };

        document.body.appendChild(script);
      });
    }
    async function initLiffMember() {
      try {
        await liff.init({ liffId: LIFF_ID });
    
        if (!liff.isLoggedIn()) {
          liff.login({
            redirectUri: window.location.href
          });
          return;
        }
    
        const profile = await liff.getProfile();
    
        lineProfile = {
          lineUserId: profile.userId || '',
          lineDisplayName: profile.displayName || '',
          linePictureUrl: profile.pictureUrl || ''
        };
    
        console.log('LINE profile:', lineProfile);
      } catch (error) {
        console.warn('LIFF 初始化失敗，不影響一般點餐：', error);
      }
    }
    function setDefaultPickupTime() {
      const input = document.getElementById('pickupTimeInput');
      if (!input) return;
    
      const now = new Date();
    
      // 預設往後 20 分鐘，比較符合實際備餐
      now.setMinutes(now.getMinutes() + 20);
    
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      const hh = String(now.getHours()).padStart(2, '0');
      const min = String(now.getMinutes()).padStart(2, '0');
    
      input.value = `${yyyy}-${mm}-${dd}T${hh}:${min}`;
    }

    function initPageMode() {
      const params = new URLSearchParams(window.location.search);
      groupId = params.get('groupId') || '';
      isHostMode = params.get('host') === '1';
    
      if (groupId) {
        document.getElementById('pageSubtitle').textContent = isHostMode ? '團訂主揪管理模式' : '團訂點餐模式';
        document.getElementById('cartTitle').textContent = isHostMode ? '主揪購物車' : '我的團訂餐點';
        document.getElementById('checkoutBtn').textContent = isHostMode ? '加入我的餐點' : '加入團訂';
    
        document.getElementById('groupModeBanner').classList.add('show');
        document.getElementById('groupInfoCard').classList.remove('hidden');
    
        const sideSubmitBtn = document.getElementById('hostSubmitGroupBtn');
        if (sideSubmitBtn) {
          sideSubmitBtn.style.display = isHostMode ? 'block' : 'none';
        }
    
        const cartSubmitBtn = document.getElementById('hostSubmitGroupCartBtn');
        if (cartSubmitBtn) {
          cartSubmitBtn.style.display = isHostMode ? 'block' : 'none';
        }
    
        loadGroupOrder();
    
        if (isHostMode) {
          startGroupAutoRefresh();
        }
      }
    }

    async function loadMenu() {
      const grid = document.getElementById('productGrid');

      try {
        grid.innerHTML = '<div class="loading">菜單載入中...</div>';
        const data = await jsonp(API_URL + '?mode=webMenu');

        if (data.status !== 'success') {
          grid.innerHTML = '<div class="error">' + (data.message || '菜單讀取失敗') + '</div>';
          return;
        }

        menuItems = data.items || [];
        renderCategories();
        renderProducts();
      } catch (error) {
        grid.innerHTML = '<div class="error">菜單讀取失敗：' + error.message + '</div>';
      }
    }

    function renderCategories() {
      const list = document.getElementById('categoryList');
      const categories = ['全部', ...Array.from(new Set(menuItems.map(item => item.category).filter(Boolean)))];

      list.innerHTML = categories.map(category => `
        <button class="category-btn ${category === selectedCategory ? 'active' : ''}" onclick="selectCategory('${escapeJs(category)}')">
          ${escapeHtml(category)}
        </button>
      `).join('');
    }

    function selectCategory(category) {
      selectedCategory = category;
      renderCategories();
      renderProducts();
    }

    function renderProducts() {
      const grid = document.getElementById('productGrid');
      const filtered = menuItems.filter(item => selectedCategory === '全部' || item.category === selectedCategory);

      document.getElementById('currentCategoryTitle').textContent = selectedCategory;
      document.getElementById('menuCount').textContent = filtered.length + ' 項';

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="loading">沒有符合的商品</div>';
        return;
      }

      grid.innerHTML = filtered.map(item => {
        const imageHtml = item.image
          ? `<img class="product-image" src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name)}" loading="lazy" onerror="this.replaceWith(createPlaceholder('${escapeJs(item.name)}'))">`
          : `<div class="product-image placeholder">暫無圖片</div>`;

        return `
          <article class="product-card">
            ${imageHtml}
            <div class="product-body">
              <div class="product-name">${escapeHtml(item.name)}</div>
              <div class="product-desc">${escapeHtml(item.description || '')}</div>
              <div class="product-footer">
                <div class="price">NT$${Number(item.price || 0)}</div>
                <button class="add-btn" onclick="addToCart('${escapeJs(item.name)}')">+</button>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    function createPlaceholder(name) {
      const div = document.createElement('div');
      div.className = 'product-image placeholder';
      div.textContent = '暫無圖片';
      return div;
    }

    function addToCart(name) {
      const item = menuItems.find(x => x.name === name);
      if (!item) return;

      const existing = cart.find(x => x.name === name);

      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({
          category: item.category,
          name: item.name,
          price: Number(item.price || 0),
          quantity: 1
        });
      }

      renderCart();
      showToast(groupId ? '已加入我的團訂餐點' : '已加入購物車');
    }

    function increaseQty(name) {
      const item = cart.find(x => x.name === name);
      if (!item) return;
      item.quantity += 1;
      renderCart();
    }

    function decreaseQty(name) {
      const item = cart.find(x => x.name === name);
      if (!item) return;

      if (item.quantity <= 1) {
        cart = cart.filter(x => x.name !== name);
      } else {
        item.quantity -= 1;
      }

      renderCart();
    }

    function removeCartItem(name) {
      cart = cart.filter(x => x.name !== name);
      renderCart();
    }

    function clearCart() {
      cart = [];
      renderCart();
    }

  function renderCart() {
    const cartItems = document.getElementById('cartItems');
  
    // 只有主揪模式，而且主揪自己的購物車是空的，才隱藏這一塊
    const shouldHideEmptyCartArea = groupId && isHostMode && cart.length === 0;
  
    if (shouldHideEmptyCartArea) {
      cartItems.classList.add('hidden-empty');
      cartItems.innerHTML = '';
    } else {
      cartItems.classList.remove('hidden-empty');
  
      if (cart.length === 0) {
        cartItems.innerHTML = '<div class="cart-empty">尚未加入商品</div>';
      } else {
        cartItems.innerHTML = cart.map(item => {
          const lineTotal = item.price * item.quantity;
  
          return `
            <div class="cart-item">
              <div class="cart-item-top">
                <div>
                  <div class="cart-item-name">${escapeHtml(item.name)}</div>
                  <div class="cart-item-sub">NT$${item.price} x ${item.quantity}</div>
                </div>
                <div class="cart-item-price">NT$${lineTotal}</div>
              </div>
  
              <div class="qty-row">
                <button class="qty-btn" onclick="decreaseQty('${escapeJs(item.name)}')">−</button>
                <div class="qty">${item.quantity}</div>
                <button class="qty-btn" onclick="increaseQty('${escapeJs(item.name)}')">+</button>
                <button class="remove-btn" onclick="removeCartItem('${escapeJs(item.name)}')">刪除</button>
              </div>
            </div>
          `;
        }).join('');
      }
    }
  
    const total = getTotal();
    const count = cart.reduce((sum, item) => sum + item.quantity, 0);
  
    document.getElementById('subtotal').textContent = total;
    document.getElementById('total').textContent = total;
    document.getElementById('headerCartCount').textContent = count;
    document.getElementById('headerCartTotal').textContent = total;
    document.getElementById('mobileCartCount').textContent = count;
    document.getElementById('mobileCartTotal').textContent = total;
    document.getElementById('checkoutBtn').disabled = cart.length === 0;
  }

    function getTotal() {
      return cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
    }

    function openCheckout() {
      if (cart.length === 0) return;

      document.getElementById('modalTotal').textContent = getTotal();

      if (groupId) {
        document.getElementById('checkoutModalTitle').textContent = '加入團訂';
        document.getElementById('checkoutModalSubtitle').textContent = isHostMode
          ? '主揪資料會自動帶入，確認餐點後即可加入。'
          : '請填寫你的姓名，餐點會加入此團訂。';
      
        document.getElementById('paymentSection').style.display = 'none';
        document.getElementById('nameLabel').textContent = '成員姓名';
        document.getElementById('submitOrderBtn').textContent = '加入團訂';
      
        const phoneField = document.getElementById('customerPhoneField');
        const phoneLabel = document.getElementById('phoneLabel');
      
        if (isHostMode) {
          phoneField.style.display = 'flex';
          phoneLabel.textContent = '主揪電話';
        } else {
          phoneField.style.display = 'none';
        }
      
        prefillGroupMemberInfo();
      }else {
              document.getElementById('checkoutModalTitle').textContent = '確認訂單';
        document.getElementById('checkoutModalSubtitle').textContent = '請填寫資料並選擇付款方式';
        document.getElementById('paymentSection').style.display = 'block';
        document.getElementById('nameLabel').textContent = '姓名';
        document.getElementById('phoneLabel').textContent = '電話';
        document.getElementById('submitOrderBtn').textContent = '送出訂單';
      }

      document.getElementById('checkoutModal').classList.add('show');
    }

    function closeCheckout() {
      document.getElementById('checkoutModal').classList.remove('show');
    }

    function selectPayment(method) {
      paymentMethod = method;
      document.querySelectorAll('.payment-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.payment === method);
      });
    }

    async function submitOrder() {
      if (groupId) {
        await saveGroupItems();
        return;
      }

      await submitNormalOrder();
    }
    async function submitNormalOrder() {
      const name = document.getElementById('customerName').value.trim();
      const phone = document.getElementById('customerPhone').value.trim();
      const note = document.getElementById('customerNote').value.trim();
    
      if (!name) return showToast('請輸入姓名');
      if (!phone) return showToast('請輸入電話');
      if (cart.length === 0) return showToast('購物車是空的');
    
      const submitBtn = document.getElementById('submitOrderBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = '送出中...';
    
      const payload = {
        storeName: '線上點餐',
        storeCode: 'WEB',
    
        customerName: name,
        customerPhone: phone,
        customerNote: note,
    
        lineUserId: lineProfile.lineUserId || '',
        lineDisplayName: lineProfile.lineDisplayName || '',
        linePictureUrl: lineProfile.linePictureUrl || '',
    
        paymentMethod: paymentMethod,
        paymentMethodText: paymentMethod,
    
        subtotal: getTotal(),
        discountType: 'none',
        discountValue: 0,
        discountAmount: 0,
        total: getTotal(),
    
        items: cart.map(item => ({
          category: item.category,
          name: item.name,
          price: item.price,
          quantity: item.quantity,
          lineTotal: item.price * item.quantity
        }))
      };
    
      try {
        const data = await jsonp(
          API_URL +
          '?mode=webCheckout&payload=' +
          encodeURIComponent(JSON.stringify(payload))
        );
    
        if (data.status === 'success') {
          closeCheckout();
          clearCart();
    
          document.getElementById('customerName').value = '';
          document.getElementById('customerPhone').value = '';
          document.getElementById('customerNote').value = '';
    
          showToast('訂單已送出，訂單編號：' + (data.orderId || ''));
        } else {
          showToast(data.message || '訂單送出失敗');
        }
    
      } catch (error) {
        showToast('訂單送出失敗：' + error.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '送出訂單';
      }
    }

    function openCreateGroupModal() {
      setDefaultPickupTime();
      document.getElementById('createGroupModal').classList.add('show');
    }

    function closeCreateGroupModal() {
      document.getElementById('createGroupModal').classList.remove('show');
    }

    async function createGroupOrder() {
      const title = document.getElementById('groupTitleInput').value.trim();
      const hostName = document.getElementById('hostNameInput').value.trim();
      const hostPhone = document.getElementById('hostPhoneInput').value.trim();
      const pickupTimeRaw = document.getElementById('pickupTimeInput').value.trim();
      const pickupTime = formatDateTimeLocal(pickupTimeRaw);
      const note = document.getElementById('groupNoteInput').value.trim();

      if (!title) return showToast('請輸入團訂名稱');
      if (!hostName) return showToast('請輸入主揪姓名');
      if (!hostPhone) return showToast('請輸入主揪電話');

      const btn = document.getElementById('createGroupBtn');
      btn.disabled = true;
      btn.textContent = '建立中...';

      const payload = {
        title,
        hostName,
        hostPhone,
        pickupTime,
        note,
      
        lineUserId: lineProfile.lineUserId || '',
        lineDisplayName: lineProfile.lineDisplayName || '',
        linePictureUrl: lineProfile.linePictureUrl || '',
      
        source: 'GROUP_WEB'
      };

      try {
        const data = await jsonp(API_URL + '?mode=createGroupOrder&payload=' + encodeURIComponent(JSON.stringify(payload)));

        if (data.status === 'success') {
          const newGroupId = data.groupId;
        
          try {
            localStorage.setItem('group_member_' + newGroupId, JSON.stringify({
              memberName: hostName,
              memberPhone: hostPhone
            }));
          } catch (error) {}
        
          const hostUrl = buildGroupUrl(newGroupId, true);
          closeCreateGroupModal();
          showToast('團訂已建立');
          window.location.href = hostUrl;
        }else {
          showToast(data.message || '建立團訂失敗');
        }
      } catch (error) {
        showToast('建立團訂失敗：' + error.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '建立團訂';
      }
    }
    function formatDateTimeLocal(value) {
      if (!value) return '';
    
      // value 會長這樣：2026-05-05T12:30
      const parts = value.split('T');
      if (parts.length !== 2) return value;
    
      const date = parts[0].replaceAll('-', '/');
      const time = parts[1];
    
      return `${date} ${time}`;
    }

    async function loadGroupOrder(silent = false) {
      if (!groupId) return;
    
      try {
        const data = await jsonp(API_URL + '?mode=getGroupOrder&groupId=' + encodeURIComponent(groupId));
    
        if (data.status !== 'success') {
          if (!silent) {
            showToast(data.message || '讀取團訂失敗');
          }
          return;
        }
    
        currentGroup = data.group || null;
        groupMembers = data.members || [];
        renderGroupInfo();
      } catch (error) {
        if (!silent) {
          showToast('讀取團訂失敗：' + error.message);
        }
      }
    }

    function startGroupAutoRefresh() {
      if (groupRefreshTimer) {
        clearInterval(groupRefreshTimer);
      }
    
      groupRefreshTimer = setInterval(() => {
        if (groupId && isHostMode) {
          loadGroupOrder(true);
        }
      }, 1000);
    }

    function renderGroupInfo() {
      if (!currentGroup) return;

      const title = currentGroup.title || currentGroup.groupTitle || '團訂';
      const pickup = currentGroup.pickupTime || '-';
      const status = currentGroup.status || '開放中';

      document.getElementById('groupBannerTitle').textContent = title;
      document.getElementById('groupBannerSubtitle').textContent = '取餐時間：' + pickup + '｜狀態：' + status;

      document.getElementById('sideGroupTitle').textContent = '名稱：' + title;
      document.getElementById('sideGroupPickup').textContent = '取餐：' + pickup;
      document.getElementById('sideGroupStatus').textContent = '狀態：' + status;

      renderGroupMembersSummary();
    }

    function renderGroupMembersSummary() {
      const box = document.getElementById('groupMembersSummary');
    
      if (!groupId || !groupMembers.length) {
        box.style.display = 'none';
        box.innerHTML = '';
        return;
      }
    
      const myMemberId = getGroupMemberId();
    
      // 主揪看全部；跟團者只看自己
      const visibleMembers = isHostMode
        ? groupMembers
        : groupMembers.filter(member => String(member.memberId || '') === String(myMemberId));
    
      if (!visibleMembers.length) {
        box.style.display = 'none';
        box.innerHTML = '';
        return;
      }
    
      box.style.display = 'block';
    
      const totalAll = groupMembers.reduce((sum, member) => {
        return sum + Number(member.subtotal || 0);
      }, 0);
    
      const visibleTotal = visibleMembers.reduce((sum, member) => {
        return sum + Number(member.subtotal || 0);
      }, 0);
    
      const titleText = isHostMode
        ? `目前團訂 NT$${totalAll}`
        : `我的已送出餐點 NT$${visibleTotal}`;
    
      const blocks = visibleMembers.map(member => {
        const items = Array.isArray(member.items) ? member.items : [];
    
        const lines = items.map(item => {
          return `${escapeHtml(item.name)} x ${Number(item.quantity || 0)}`;
        }).join('<br>');
    
        const isOwn = String(member.memberId || '') === String(myMemberId);
    
        return `
          <div
            class="member-block ${isOwn ? 'own' : ''}"
            ${isOwn ? `onclick="editMyGroupItems('${escapeJs(member.memberId)}')"` : ''}
          >
            <div class="member-block-head">
              <span>${escapeHtml(member.memberName || member.name || '未命名')}</span>
              <span>NT$${Number(member.subtotal || 0)}</span>
            </div>
    
            <div class="member-block-items">
              ${lines || '沒有品項'}
            </div>
    
            ${isOwn ? '<div class="member-edit-hint">點這裡可修改我的餐點</div>' : ''}
          </div>
        `;
      }).join('');
    
      box.innerHTML = `
        <div class="member-summary-title">${titleText}</div>
        ${blocks}
      `;
    }      
    function editMyGroupItems(memberId) {
      const myMemberId = getGroupMemberId();
    
      if (String(memberId || '') !== String(myMemberId)) {
        showToast('只能修改自己的餐點');
        return;
      }
    
      const member = groupMembers.find(m => String(m.memberId || '') === String(myMemberId));
    
      if (!member) {
        showToast('找不到你的餐點');
        return;
      }
    
      cart = (member.items || []).map(item => ({
        category: item.category || '',
        name: item.name,
        price: Number(item.price || 0),
        quantity: Number(item.quantity || 0)
      })).filter(item => item.name && item.quantity > 0);
    
      saveGroupMemberInfo(member.memberName || '', member.memberPhone || '');
    
      renderCart();
      toggleMobileCart();
    
      showToast('已載入你的餐點，可修改後重新加入團訂');
    }

    async function saveGroupItems() {
     const memberName = document.getElementById('customerName').value.trim();
    const memberPhone = document.getElementById('customerPhone').value.trim();
    const note = document.getElementById('customerNote').value.trim();
    const memberId = getGroupMemberId();
    
    if (!memberName) return showToast('請輸入成員姓名');
    if (cart.length === 0) return showToast('尚未選擇餐點');

      const submitBtn = document.getElementById('submitOrderBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = '加入中...';

      const payload = {
        groupId,
        memberId,
        memberName,
        memberPhone,
      
        lineUserId: lineProfile.lineUserId || '',
        lineDisplayName: lineProfile.lineDisplayName || '',
        linePictureUrl: lineProfile.linePictureUrl || '',
      
        note,
        items: cart.map(item => ({
          category: item.category,
          name: item.name,
          price: item.price,
          quantity: item.quantity,
          lineTotal: item.price * item.quantity
        }))
      };

      try {
        const data = await jsonp(API_URL + '?mode=saveGroupItems&payload=' + encodeURIComponent(JSON.stringify(payload)));

        if (data.status === 'success') {
          saveGroupMemberInfo(memberName, memberPhone);
        
          closeCheckout();
          clearCart();
        
          // 姓名不要清掉，下次可以直接帶入
          document.getElementById('customerNote').value = '';
        
          showToast('已加入團訂');
          await loadGroupOrder();
        }else {
          showToast(data.message || '加入團訂失敗');
        }
      } catch (error) {
        showToast('加入團訂失敗：' + error.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '加入團訂';
      }
    }
    function saveGroupMemberInfo(memberName, memberPhone) {
      try {
        localStorage.setItem(getMemberStorageKey(), JSON.stringify({
          memberName,
          memberPhone
        }));
      } catch (error) {
        // localStorage 失敗就略過
      }
    }
    async function submitGroupOrder() {
      if (!groupId) return;
    
      if (!isHostMode) {
        showToast('只有主揪可以送出團訂');
        return;
      }
    
      if (!confirm('確定要送出整筆團訂嗎？送出後會寫入訂單紀錄。')) return;
    
      const buttons = [
        document.getElementById('hostSubmitGroupBtn'),
        document.getElementById('hostSubmitGroupCartBtn')
      ].filter(Boolean);
    
      buttons.forEach(btn => {
        btn.disabled = true;
        btn.textContent = '送出中...';
      });
    
      const payload = {
        groupId,
        paymentMethod: paymentMethod,
        paymentMethodText: paymentMethod,
        source: 'GROUP_WEB'
      };
    
      try {
        const data = await jsonp(API_URL + '?mode=submitGroupOrder&payload=' + encodeURIComponent(JSON.stringify(payload)));
    
        if (data.status === 'success') {
          showToast('團訂已送出，訂單編號：' + (data.orderId || ''));
        
          leaveGroupMode();
        
          setTimeout(() => {
            window.location.href = window.location.origin + window.location.pathname;
          }, 900);
        
        } else {
          showToast(data.message || '送出團訂失敗');
        }
      } catch (error) {
        showToast('送出團訂失敗：' + error.message);
      } finally {
        buttons.forEach(btn => {
          btn.disabled = false;
          btn.textContent = btn.id === 'hostSubmitGroupCartBtn'
            ? '主揪送出整筆團訂'
            : '主揪送出團訂';
        });
      }
    }

    function buildGroupUrl(id, hostMode) {
      const url = new URL(window.location.href);
      url.search = '';
      url.searchParams.set('groupId', id);
      if (hostMode) url.searchParams.set('host', '1');
      return url.toString();
    }

    function getShareGroupUrl() {
      if (!groupId) return window.location.href;
      return buildGroupUrl(groupId, false);
    }

    async function copyGroupLink() {
      const link = getShareGroupUrl();

      try {
        await navigator.clipboard.writeText(link);
        showToast('已複製團訂連結');
      } catch (error) {
        prompt('請複製團訂連結', link);
      }
    }
    function leaveGroupMode() {
      groupId = '';
      isHostMode = false;
      currentGroup = null;
      groupMembers = [];
    
      document.getElementById('pageSubtitle').textContent = '我們是 crewcrew 集團';
      document.getElementById('cartTitle').textContent = '購物車';
      document.getElementById('checkoutBtn').textContent = '前往結帳';
    
      document.getElementById('groupModeBanner').classList.remove('show');
      document.getElementById('groupInfoCard').classList.add('hidden');
      document.getElementById('hostSubmitGroupBtn').style.display = 'none';
    
      document.getElementById('groupMembersSummary').style.display = 'none';
      document.getElementById('groupMembersSummary').innerHTML = '';
    
      clearCart();
    }
    function toggleMobileCart() {
      document.getElementById('cartPanel').classList.toggle('mobile-open');
    }

    function closeMobileCart() {
      document.getElementById('cartPanel').classList.remove('mobile-open');
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeJs(value) {
      return String(value ?? '')
        .replaceAll('\\', '\\\\')
        .replaceAll("'", "\\'")
        .replaceAll('"', '\\"')
        .replaceAll('\n', '\\n')
        .replaceAll('\r', '');
    }

}
